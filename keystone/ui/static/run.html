<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Keystone — Discovery Run</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;500;600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/lib/ks-design.css?v=3"/>
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>
</head>
<body>
<div class="app">
  <header class="top">
    <div style="display:flex;align-items:center;gap:16px;min-width:0">
      <a href="/" class="brand" title="Keystone front door">Keystone</a>
      <span class="vr"></span>
      <span class="progmono" id="progmono">Keystone · loading engine…</span>
    </div>
    <div class="search" id="searchwrap" title="Ask the Decision Engine a research question, type any gene for live Open Targets, or paste a DOI for prior art — then press Enter">
      <span class="ms" style="font-size:19px;color:var(--primary)">search</span>
      <input id="searchbox" autocomplete="off" placeholder="Ask the Decision Engine a question · type a gene · paste a DOI — then ↵"/>
      <span class="searchhint" id="searchhint">Decision Engine</span>
      <span class="kbd">⏎</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="livebadge" title="Claude connection status" style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--hairline);border-radius:20px"></span>
      <button class="fi" data-screen="integrity" title="Field Integrity — computed">
        <span style="display:flex;flex-direction:column;align-items:flex-start;gap:3px;white-space:nowrap">
          <span style="font:500 9px/1 'JetBrains Mono',monospace;letter-spacing:.12em;color:var(--secondary)">FIELD INTEGRITY</span>
          <span style="font:500 12px/1 'Inter Tight',sans-serif;color:var(--ink)"><span id="fiband">—</span> <span style="font:400 11px/1 'JetBrains Mono',monospace;color:var(--ink2)">· <span id="finum">—</span></span></span>
        </span>
        <span class="bars"><i style="height:6px;background:var(--hairline)"></i><i style="height:10px;background:var(--outline)"></i><i style="height:8px;background:var(--hairline)"></i><i style="height:14px;background:var(--accent)"></i><i style="height:11px;background:var(--outline)"></i></span>
      </button>
      <button class="iconbtn" id="howbtn" title="How a scientist uses Keystone"><span class="ms" style="font-size:19px">help</span></button>
      <button class="iconbtn" id="themebtn" title="Toggle instrument mode"><span class="ms" id="themeicon" style="font-size:19px">dark_mode</span></button>
      <button class="export"><span class="ms" style="font-size:17px">ios_share</span>Export</button>
    </div>
  </header>

  <div style="flex:1;display:flex;min-height:0">
    <aside class="rail">
      <div class="railhead">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
          <span class="kick">ACTIVE PROGRAM</span>
          <select id="progswitch" title="Switch program — real engine data or illustrative"
            style="font:500 9px/1 'JetBrains Mono',monospace;letter-spacing:.05em;color:var(--secondary);background:var(--container);border:1px solid var(--hairline);border-radius:6px;padding:4px 6px;cursor:pointer">
            <option value="tcell">IMMUNOLOGY · CD4 T-CELL</option>
            <option value="gbm">CANCER · GBM</option>
            <option value="ich">BRAIN HEMORRHAGE · ICH</option>
            <option value="insulin">DIABETES · INSULIN</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:11px">
          <div class="ptile"><span class="ms" style="font-size:20px;color:var(--secondary)">genetics</span></div>
          <div style="min-width:0">
            <div id="progname" style="font:500 14px/1.2 'Inter Tight',sans-serif;color:var(--ink)">Loading…</div>
            <div id="progsub" style="font:400 11px/1.3 'Inter Tight',sans-serif;color:var(--secondary)">fetching real engine data</div>
          </div>
        </div>
        <div class="illus" id="progbadge"><span class="ms" style="font-size:13px">info</span>ILLUSTRATIVE EXAMPLE · SYNTHETIC DATA</div>
      </div>
      <nav style="flex:1;overflow-y:auto;padding:14px 12px" id="nav"></nav>
    </aside>
    <main id="main"></main>
  </div>

</div>
<script src="/static/lib/ks-design.js?v=15"></script>
</body>
</html>
