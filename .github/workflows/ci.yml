name: keystone-ci

# Keystone runs fully offline and deterministically: no network, no API key.
# CI proves every push keeps the 167 tests green, recomputes the headline
# load-bearing metric (0.818) from the committed labelled corpus, and enforces
# the honesty discipline (no operating-system marketing metaphor re-enters).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      KEYSTONE_OFFLINE: "1"          # deterministic: fixtures only, no live calls
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (offline runtime + test deps; anthropic intentionally omitted)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ui,agent]"

      - name: Test suite (offline, deterministic, ~2s)
        run: pytest -q

      - name: Reproduce the headline metric (0.818 from committed labels)
        run: |
          python calibrate.py | tee /tmp/calibration.txt
          grep -q "0.818" /tmp/calibration.txt

      - name: Honesty gate — no operating-system marketing metaphor
        run: |
          ! grep -rnE 'Scientific Operating System|Operating System|Scientific Operator|Command Center' \
              pyproject.toml README.md keystone/ui/static/*.html
